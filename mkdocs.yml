# Jalankan dari folder ini: cd docs && mkdocs build
site_name: Dunia Game — Dokumentasi
site_description: Sistem redeem voucher dan transaksi prepaid game.
# Wajib untuk GitHub Pages (/nama-repo/) agar CSS, JS, dan navigasi tidak putus
site_url: https://maulana222.github.io/dunia-game-voucher-redeem-docs/

# Ikon GitHub + tautan di header (seperti dokumentasi Material pada umumnya)
repo_url: https://github.com/maulana222/dunia-game-voucher-redeem-docs
repo_name: maulana222/dunia-game-voucher-redeem-docs
edit_uri: edit/main/pages/

theme:
  name: material
  language: id
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode terang
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode gelap
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

docs_dir: pages
site_dir: site

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Beranda: index.md
  - Tentang aplikasi: tentang.md
  - Fitur:
      - fitur/redeem-transaksi.md
      - fitur/panel-admin.md
      - fitur/member-koneksi.md
      - fitur/produk-voucher.md
      - fitur/notifikasi-realtime.md
      - fitur/antrian-pemrosesan.md
  - Memulai: memulai.md
  - Integrasi API (partner): integrasi-api.md
  - Keamanan: keamanan.md

plugins:
  - search

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maulana222/dunia-game-voucher-redeem-docs
