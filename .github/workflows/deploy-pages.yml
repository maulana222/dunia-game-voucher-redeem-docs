# Build MkDocs dan push ke branch gh-pages untuk GitHub Pages
name: Deploy dokumentasi ke GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'pages/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pasang dependensi MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build MkDocs
        run: mkdocs build --strict

      - name: Deploy ke branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
